<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GTAV 私人地圖標記</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; font-family: system-ui, -apple-system, "Noto Sans TC", sans-serif; background: #0b1020; color: #fff; }
    .app { display: grid; grid-template-columns: 360px 1fr; height: 100vh; }
    .sidebar { border-right: 1px solid #243047; background: #101827; padding: 14px; overflow: auto; }
    .viewer { position: relative; overflow: hidden; background: #243845; touch-action: none; }
    .card { background: #0f172a; border: 1px solid #2d3c57; border-radius: 16px; padding: 12px; margin-bottom: 12px; }
    .title { font-size: 26px; font-weight: 800; margin-bottom: 8px; }
    .subtitle { font-size: 13px; color: #c7d2fe; line-height: 1.5; }
    label { display: block; font-size: 13px; margin: 8px 0 4px; color: #dbeafe; }
    input, select, textarea, button { width: 100%; border-radius: 12px; border: 1px solid #334155; background: #111c31; color: white; padding: 10px 12px; font-size: 14px; }
    textarea { min-height: 90px; resize: vertical; }
    button { cursor: pointer; font-weight: 700; background: #0891b2; border: none; }
    .muted-btn { background: #334155; }
    .danger { background: #991b1b; }
    .row { display: flex; gap: 8px; }
    .row > * { flex: 1; }
    .icon-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; max-height: 260px; overflow: auto; margin-top: 8px; }
    .icon-btn { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; min-height: 62px; font-size: 22px; background: #1e293b; border: 1px solid #334155; padding: 8px 6px; }
    .icon-btn span { font-size: 11px; line-height: 1.2; text-align: center; color: #d1d5db; font-weight: 500; }
    .icon-btn.active { outline: 2px solid #22d3ee; background: #0e7490; }
    .topbar { position: absolute; top: 12px; right: 12px; z-index: 10; display: flex; gap: 8px; pointer-events: auto; }
    .topbar button { width: auto; min-width: 44px; padding: 10px 12px; background: rgba(15,23,42,.92); border: 1px solid #334155; }
    .hint { position: absolute; left: 12px; bottom: 12px; z-index: 10; padding: 8px 10px; border-radius: 12px; background: rgba(15,23,42,.88); border: 1px solid #334155; color: #cbd5e1; font-size: 12px; }
    #stage { position: absolute; left: 0; top: 0; transform-origin: 0 0; will-change: transform; }
    #stage img { display: block; user-select: none; -webkit-user-drag: none; max-width: none; }
    .marker { position: absolute; transform: translate(-50%, -100%); background: transparent; border: none; padding: 0; cursor: pointer; font-size: 28px; line-height: 1; filter: drop-shadow(0 2px 6px rgba(0,0,0,.8)); width: auto; }
    /* 修正：不要讓名稱標籤一直顯示，避免被縮放後變成一條一條黑線 */
    .marker-label { display: none; margin-top: 2px; white-space: nowrap; border-radius: 999px; font-size: 12px; background: rgba(15,23,42,.90); border: 1px solid #334155; padding: 2px 7px; transform: translateX(-28%); color: #fff; }
    .marker:hover .marker-label, .marker:focus .marker-label { display: block; }
    .small { font-size: 12px; color: #cbd5e1; line-height: 1.5; }
    .status-ok { color: #86efac; }
    .status-warn { color: #fde68a; }
    .status-bad { color: #fca5a5; }
    .marker-list { display: flex; flex-direction: column; gap: 8px; }
    .marker-item { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 10px; text-align: left; }
    .modal { position: fixed; inset: 0; background: rgba(0,0,0,.7); display: none; align-items: center; justify-content: center; padding: 16px; z-index: 20; }
    .modal-box { width: min(440px, 100%); background: #111827; border: 1px solid #334155; border-radius: 18px; padding: 18px; }
    @media (max-width: 900px) {
      .app { grid-template-columns: 1fr; grid-template-rows: 44vh 56vh; }
      .sidebar { border-right: none; border-bottom: 1px solid #243047; }
      .topbar { top: 8px; right: 8px; }
      .topbar button { padding: 8px 10px; }
    }
  </style>
</head>

  <script>
    const $ = (id) => document.getElementById(id);
    const viewer = $("viewer");
    const stage = $("stage");
    const mapImage = $("mapImage");
    const modal = $("markerModal");
    const topbar = $("topbar");

    let activeMap = localStorage.getItem("gtav_active_map") || "map-atlas.png";
    let selectedIcon = localStorage.getItem("gtav_selected_icon") || "🏠";
    let allMarkers = {};
    let editingMarkerId = null;
    let pendingPoint = null;
    let githubSha = null;

    let viewState = { scale: 1, x: 0, y: 0 };
    let imgSize = { w: 1, h: 1 };
    let baseScale = 1;
    let dragInfo = { active: false, moved: false, x: 0, y: 0, blocked: false };
    let pinchInfo = null;
    let movingMarkerId = null;
    let movingMarkerMoved = false;
    let suppressNextMarkerClick = false;

    /* 修正：右上角控制按鈕不要冒泡到地圖，避免按 + - 重置變新增標籤 */
    ["click", "pointerdown", "pointerup", "mousedown", "mouseup", "touchstart", "touchend"].forEach(evt => {
      topbar.addEventListener(evt, (e) => e.stopPropagation(), { passive: false });
    });

    function isControlTarget(target) {
      return !!target.closest("button, input, select, textarea, .topbar, .sidebar, .modal");
    }

    function getMarkerBucket() {
      return allMarkers[activeMap] || [];
    }

    function setMarkerBucket(list) {
      allMarkers[activeMap] = list;
      saveLocalData();
    }

    function saveLocalData() {
      localStorage.setItem("gtav_markers", JSON.stringify(allMarkers));
      localStorage.setItem("gtav_active_map", activeMap);
      localStorage.setItem("gtav_selected_icon", selectedIcon);
    }

    function loadLocalData() {
      try {
        allMarkers = JSON.parse(localStorage.getItem("gtav_markers") || "{}");
      } catch (e) {
        allMarkers = {};
      }
    }

    function saveSettings() {
      ["playerName","ghOwner","ghRepo","ghBranch","ghPath","ghToken"].forEach(id => {
        localStorage.setItem("gtav_" + id, $(id).value);
      });
      setStatus("設定已儲存", "ok");
    }

    function loadSettings() {
      ["playerName","ghOwner","ghRepo","ghBranch","ghPath","ghToken"].forEach(id => {
        const v = localStorage.getItem("gtav_" + id);
        if (v !== null) $(id).value = v;
      });
    }

    function setStatus(text, type="warn") {
      const el = $("syncStatus");
      el.textContent = text;
      el.className = "small " + (type === "ok" ? "status-ok" : type === "bad" ? "status-bad" : "status-warn");
    }

    function selectIcon(icon) {
      selectedIcon = icon;
      $("iconSelect").value = icon;
      document.querySelectorAll(".icon-btn").forEach(btn => {
        btn.classList.toggle("active", btn.textContent.includes(icon));
      });
      localStorage.setItem("gtav_selected_icon", selectedIcon);
    }

    function switchMap(mapName) {
      activeMap = mapName;
      $("mapSelect").value = mapName;
      mapImage.src = mapName + "?v=" + Date.now();
      saveLocalData();
    }

    mapImage.onload = () => {
      imgSize = { w: mapImage.naturalWidth, h: mapImage.naturalHeight };
      resetView();
      renderMarkers();
    };

    function resetView() {
      const rect = viewer.getBoundingClientRect();
      const scale = Math.min(rect.width / imgSize.w, rect.height / imgSize.h) * 0.94;
      viewState.scale = scale;
      baseScale = scale;
      viewState.x = (rect.width - imgSize.w * scale) / 2;
      viewState.y = (rect.height - imgSize.h * scale) / 2;
      applyView();
    }

    function applyView() {
      stage.style.transform = `translate(${viewState.x}px, ${viewState.y}px) scale(${viewState.scale})`;
      // 標記大小規則：
      // 地圖縮小/初始時：圖示很小
      // 地圖越放大：圖示才逐步變大
      // 但不會跟著地圖無限放大
      const zoomRatio = Math.max(0.01, viewState.scale / Math.max(baseScale, 0.01));
      const desiredScreenScale = Math.max(0.38, Math.min(1.15, 0.42 * Math.sqrt(zoomRatio)));
      stage.style.setProperty("--marker-scale", String(desiredScreenScale / viewState.scale));
    }

    function zoomAt(factor, cx, cy) {
      const beforeX = (cx - viewState.x) / viewState.scale;
      const beforeY = (cy - viewState.y) / viewState.scale;
      viewState.scale = Math.max(0.05, Math.min(6, viewState.scale * factor));
      viewState.x = cx - beforeX * viewState.scale;
      viewState.y = cy - beforeY * viewState.scale;
      applyView();
    }

    function zoomBy(factor) {
      const rect = viewer.getBoundingClientRect();
      zoomAt(factor, rect.width / 2, rect.height / 2);
    }

    function screenToImage(clientX, clientY) {
      const rect = viewer.getBoundingClientRect();
      const x = (clientX - rect.left - viewState.x) / viewState.scale;
      const y = (clientY - rect.top - viewState.y) / viewState.scale;
      return {
        xPct: Math.max(0, Math.min(100, (x / imgSize.w) * 100)),
        yPct: Math.max(0, Math.min(100, (y / imgSize.h) * 100)),
      };
    }

    window.addEventListener("pointermove", (e) => {
      if (!movingMarkerId) return;
      e.preventDefault();
      movingMarkerMoved = true;
      const point = screenToImage(e.clientX, e.clientY);
      const markers = getMarkerBucket();
      const marker = markers.find(x => x.id === movingMarkerId);
      if (!marker) return;
      marker.xPct = point.xPct;
      marker.yPct = point.yPct;
      setMarkerBucket(markers);
      renderMarkers();
    }, { passive: false });

    window.addEventListener("pointerup", () => {
      if (!movingMarkerId) return;
      if (movingMarkerMoved) {
        suppressNextMarkerClick = true;
        pushToGithub("move marker");
      }
      movingMarkerId = null;
      movingMarkerMoved = false;
      setTimeout(() => { suppressNextMarkerClick = false; }, 80);
    });

    viewer.addEventListener("wheel", (e) => {
      if (isControlTarget(e.target)) return;
      e.preventDefault();
      const rect = viewer.getBoundingClientRect();
      zoomAt(e.deltaY < 0 ? 1.12 : 0.89, e.clientX - rect.left, e.clientY - rect.top);
    }, { passive: false });

    viewer.addEventListener("pointerdown", (e) => {
      if (isControlTarget(e.target) || e.target.closest(".marker") || movingMarkerId) {
        dragInfo.blocked = true;
        return;
      }
      viewer.setPointerCapture(e.pointerId);
      dragInfo.active = true;
      dragInfo.blocked = false;
      dragInfo.moved = false;
      dragInfo.x = e.clientX;
      dragInfo.y = e.clientY;
    });

    viewer.addEventListener("pointermove", (e) => {
      if (!dragInfo.active || dragInfo.blocked || pinchInfo) return;
      const dx = e.clientX - dragInfo.x;
      const dy = e.clientY - dragInfo.y;
      if (Math.abs(dx) + Math.abs(dy) > 4) dragInfo.moved = true;
      viewState.x += dx;
      viewState.y += dy;
      dragInfo.x = e.clientX;
      dragInfo.y = e.clientY;
      applyView();
    });

    viewer.addEventListener("pointerup", (e) => {
      if (dragInfo.blocked || isControlTarget(e.target) || e.target.closest(".marker")) {
        dragInfo.active = false;
        dragInfo.blocked = false;
        return;
      }
      if (!dragInfo.active) return;
      dragInfo.active = false;
      if (!dragInfo.moved && !pinchInfo) {
        pendingPoint = screenToImage(e.clientX, e.clientY);
        openCreateModal();
      }
    });

    viewer.addEventListener("touchstart", (e) => {
      if (isControlTarget(e.target)) return;
      if (e.touches.length === 2) {
        e.preventDefault();
        const [a, b] = e.touches;
        pinchInfo = {
          dist: Math.hypot(a.clientX - b.clientX, a.clientY - b.clientY),
          scale: viewState.scale,
        };
      }
    }, { passive: false });

    viewer.addEventListener("touchmove", (e) => {
      if (e.touches.length === 2 && pinchInfo) {
        e.preventDefault();
        const [a, b] = e.touches;
        const dist = Math.hypot(a.clientX - b.clientX, a.clientY - b.clientY);
        const rect = viewer.getBoundingClientRect();
        const cx = ((a.clientX + b.clientX) / 2) - rect.left;
        const cy = ((a.clientY + b.clientY) / 2) - rect.top;
        viewState.scale = pinchInfo.scale;
        zoomAt(dist / pinchInfo.dist, cx, cy);
      }
    }, { passive: false });

    viewer.addEventListener("touchend", () => {
      pinchInfo = null;
    });

    function escapeHtml(text) {
      return String(text).replace(/[&<>"']/g, (m) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      })[m]);
    }

    function renderMarkers() {
      stage.querySelectorAll(".marker").forEach(el => el.remove());
      const markers = getMarkerBucket();

      markers.forEach(marker => {
        const btn = document.createElement("button");
        btn.className = "marker";
        btn.style.left = (marker.xPct * imgSize.w / 100) + "px";
        btn.style.top = (marker.yPct * imgSize.h / 100) + "px";
        btn.innerHTML = `${marker.icon}<span class="marker-label">${escapeHtml(marker.name)}</span>`;
        btn.title = marker.name;

        // 拖曳標記：按住標記移動，放開後自動儲存位置
        btn.addEventListener("pointerdown", (e) => {
          e.stopPropagation();
          e.preventDefault();
          movingMarkerId = marker.id;
          movingMarkerMoved = false;
          suppressNextMarkerClick = false;
          btn.setPointerCapture(e.pointerId);
        });

        btn.addEventListener("click", (e) => {
          e.stopPropagation();
          if (suppressNextMarkerClick) {
            suppressNextMarkerClick = false;
            return;
          }
          openEditModal(marker.id);
        });

        stage.appendChild(btn);
      });

      $("markerCount").textContent = `目前地圖共有 ${markers.length} 個標記`;
      $("markerList").innerHTML = markers.map(marker => `
        <button type="button" class="marker-item" onclick="openEditModal('${marker.id}')">
          <div><strong>${marker.icon} ${escapeHtml(marker.name)}</strong></div>
          <div class="small">${escapeHtml(marker.owner || "匿名")}${marker.note ? "｜" + escapeHtml(marker.note) : ""}</div>
        </button>
      `).join("");
    }

    function openCreateModal() {
      editingMarkerId = null;
      $("modalTitle").textContent = "新增標記";
      $("markerName").value = "";
      $("markerNote").value = "";
      $("deleteBtn").style.display = "none";
      modal.style.display = "flex";
    }

    function openEditModal(id) {
      const marker = getMarkerBucket().find(x => x.id === id);
      if (!marker) return;
      editingMarkerId = id;
      $("modalTitle").textContent = "編輯標記";
      $("markerName").value = marker.name;
      $("markerNote").value = marker.note || "";
      $("deleteBtn").style.display = "block";
      modal.style.display = "flex";
    }

    function closeModal() {
      modal.style.display = "none";
      editingMarkerId = null;
      pendingPoint = null;
    }

    function saveMarker() {
      const name = $("markerName").value.trim();
      if (!name) {
        alert("請輸入名稱");
        return;
      }
      const markers = getMarkerBucket();
      if (editingMarkerId) {
        const marker = markers.find(x => x.id === editingMarkerId);
        if (!marker) return;
        marker.name = name;
        marker.note = $("markerNote").value.trim();
        marker.updatedAt = Date.now();
      } else {
        const icon = $("customIcon").value.trim() || selectedIcon;
        markers.push({
          id: crypto.randomUUID(),
          xPct: pendingPoint.xPct,
          yPct: pendingPoint.yPct,
          icon,
          name,
          note: $("markerNote").value.trim(),
          owner: $("playerName").value.trim() || "匿名",
          createdAt: Date.now(),
        });
      }
      setMarkerBucket(markers);
      renderMarkers();
      closeModal();
      pushToGithub("update markers");
    }

    function deleteMarker() {
      if (!editingMarkerId) return;
      const markers = getMarkerBucket().filter(x => x.id !== editingMarkerId);
      setMarkerBucket(markers);
      renderMarkers();
      closeModal();
      pushToGithub("delete marker");
    }

    function getGithubConfig() {
      return {
        owner: $("ghOwner").value.trim(),
        repo: $("ghRepo").value.trim(),
        branch: $("ghBranch").value.trim() || "main",
        path: $("ghPath").value.trim() || "markers.json",
        token: $("ghToken").value.trim(),
      };
    }

    function b64encodeUtf8(str) {
      return btoa(unescape(encodeURIComponent(str)));
    }

    function b64decodeUtf8(str) {
      return decodeURIComponent(escape(atob(str)));
    }

    async function loadFromGithub() {
      const cfg = getGithubConfig();
      if (!cfg.owner || !cfg.repo || !cfg.token) {
        setStatus("請先填 GitHub 帳號 / Repo / Token", "bad");
        return;
      }
      try {
        setStatus("GitHub 讀取中...", "warn");
        const url = `https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/${cfg.path}?ref=${cfg.branch}`;
        const res = await fetch(url, {
          headers: { Authorization: `Bearer ${cfg.token}`, Accept: "application/vnd.github+json" }
        });
        if (!res.ok) throw new Error(await res.text());
        const data = await res.json();
        githubSha = data.sha;
        const parsed = JSON.parse(b64decodeUtf8(data.content.replace(/\n/g, "")) || "{}");
        allMarkers = Array.isArray(parsed) ? { [activeMap]: parsed } : parsed;
        saveLocalData();
        renderMarkers();
        setStatus("已從 GitHub 讀取", "ok");
      } catch (err) {
        console.error(err);
        setStatus("GitHub 讀取失敗", "bad");
      }
    }

    async function pushToGithub(message) {
      const cfg = getGithubConfig();
      if (!cfg.owner || !cfg.repo || !cfg.token) {
        setStatus("已存在本機；未設定 GitHub 同步", "warn");
        return;
      }
      try {
        setStatus("寫入 GitHub 中...", "warn");
        const url = `https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/${cfg.path}`;
        const body = { message, content: b64encodeUtf8(JSON.stringify(allMarkers, null, 2)), branch: cfg.branch };
        if (githubSha) body.sha = githubSha;
        const res = await fetch(url, {
          method: "PUT",
          headers: { Authorization: `Bearer ${cfg.token}`, Accept: "application/vnd.github+json" },
          body: JSON.stringify(body)
        });
        if (!res.ok) throw new Error(await res.text());
        const data = await res.json();
        githubSha = data.content.sha;
        setStatus("已儲存到 GitHub", "ok");
      } catch (err) {
        console.error(err);
        setStatus("GitHub 寫入失敗，已先存在本機", "bad");
      }
    }

    window.addEventListener("resize", resetView);

    loadLocalData();
    loadSettings();
    selectIcon(selectedIcon);
    switchMap(activeMap);
  </script>
</body>
</html>
