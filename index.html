<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>GTAV 私人地圖標記</title>
<style>
*{box-sizing:border-box}
html,body{margin:0;height:100%;font-family:system-ui,-apple-system,"Noto Sans TC",sans-serif;background:#0b1020;color:#fff}
.app{display:grid;grid-template-columns:380px 1fr;height:100vh}
.sidebar{background:#101827;border-right:1px solid #263247;padding:16px;overflow:auto;font-size:17px}
.viewer{position:relative;overflow:hidden;background:#243845;touch-action:none}
.card{background:#0f172a;border:1px solid #2d3c57;border-radius:16px;padding:14px;margin-bottom:14px}
.title{font-size:30px;font-weight:800;margin-bottom:8px}
.subtitle{font-size:16px;color:#c7d2fe;line-height:1.65}
label{display:block;font-size:17px;font-weight:700;margin:10px 0 5px;color:#dbeafe}
input,select,textarea,button{width:100%;border-radius:12px;border:1px solid #334155;background:#111c31;color:#fff;padding:12px 14px;font-size:17px}
button{cursor:pointer;font-weight:800;background:#0891b2;border:none}
textarea{min-height:88px;resize:vertical}
.row{display:flex;gap:8px} .row>*{flex:1}
.muted-btn{background:#334155} .danger{background:#991b1b}
.small{font-size:15px;color:#dbeafe;line-height:1.75} .warn{color:#fde68a} .ok{color:#86efac} .bad{color:#fca5a5}
.icon-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;max-height:260px;overflow:auto;margin-top:8px}
.icon-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;min-height:64px;font-size:20px;background:#1e293b;border:1px solid #334155;padding:8px 6px}
.icon-btn span{font-size:13px;line-height:1.2;color:#d1d5db;font-weight:500}
.icon-btn.active{outline:3px solid #22d3ee!important;background:#0e7490!important;box-shadow:0 0 0 3px rgba(34,211,238,.25)!important}
.topbar{position:absolute;top:12px;right:12px;z-index:30;display:flex;gap:8px}
.topbar button{width:auto;min-width:44px;padding:10px 12px;background:rgba(15,23,42,.92);border:1px solid #334155}
.hint{position:absolute;left:12px;bottom:12px;z-index:30;padding:8px 10px;border-radius:12px;background:rgba(15,23,42,.88);border:1px solid #334155;color:#cbd5e1;font-size:13px}
#stage{position:absolute;left:0;top:0;transform-origin:0 0;will-change:transform}
#stage img{display:block;user-select:none;-webkit-user-drag:none;max-width:none}
#markerLayer{position:absolute;inset:0;z-index:20;pointer-events:none}
.marker{
position:absolute;
transform:translate(-50%,-50%);
background:transparent;
border:none;
padding:0;
width:30px;
height:30px;
cursor:grab;
filter:none;
pointer-events:auto;
}
.marker svg{width:30px;height:30px;display:block}
.marker-label{
  display:none;
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  min-width:145px;
  max-width:240px;
  white-space:normal;
  border-radius:9px;
  background:rgba(0,0,0,.92);
  border:1px solid rgba(255,255,255,.25);
  padding:7px 10px;
  text-align:center;
  line-height:1.35;
  z-index:999;
  box-shadow:0 3px 10px rgba(0,0,0,.75);
  pointer-events:none;
}
.marker:hover .marker-label,.marker:focus .marker-label{display:block}
.marker-name{
  display:block;
  font-weight:900;
  font-size:13px;
  color:#fff;
} .marker-owner{
  display:block;
  font-size:11px;
  color:#facc15;
  margin-top:2px;
  font-weight:700;
}

.icon-btn 
.marker-list{display:flex;flex-direction:column;gap:8px}
.marker-item{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:10px;text-align:left}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;padding:16px;z-index:50}
.modal-box{width:min(440px,100%);background:#111827;border:1px solid #334155;border-radius:18px;padding:18px}
@media(max-width:900px){
  .app{grid-template-columns:1fr;grid-template-rows:52vh 48vh}
  .sidebar{order:1;max-height:52vh;border-right:none;border-bottom:1px solid #263247;font-size:16px}
  .viewer{order:2}
  input,select,textarea,button{font-size:16px;padding:12px 14px}
  label{font-size:16px} .small{font-size:14px} .icon-grid{grid-template-columns:repeat(3,1fr);max-height:220px}
}

/* Emoji marker icons */
.emoji-icon{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  width:30px;
  height:30px;
  font-size:22px;
  line-height:1;
  font-family:"Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji",system-ui,sans-serif;
  text-shadow:
    -1px -1px 0 #000,
     1px -1px 0 #000,
    -1px  1px 0 #000,
     1px  1px 0 #000,
     0 2px 4px rgba(0,0,0,.8);
}
.marker .emoji-icon{
  width:30px;
  height:30px;
  font-size:22px;
}
.icon-btn .emoji-icon{
  width:32px;
  height:32px;
  font-size:24px;
  margin-bottom:4px;
}


.marker-note{
  display:block;
  font-size:11px;
  color:#cbd5e1;
  margin-top:4px;
  border-top:1px solid rgba(255,255,255,.18);
  padding-top:4px;
  word-break:break-word;
}
</style>
</head>
<body>
<div class="app">
<aside class="sidebar">
  <div class="title">GTAV 私人地圖</div>
  <div class="subtitle">所有人都能看公開標記；你可以本機編輯，按「上傳同步」才公開給大家。</div>

  <div class="card">
    <label>地圖樣式</label>
    <select id="mapSelect" onchange="switchMap(this.value)">
      <option value="map-atlas.png">彩色 Atlas</option>
      <option value="map-satellite.jpg">衛星圖</option>
      <option value="map-roadmap.png">Roadmap</option>
    </select>
    <div class="row" style="margin-top:8px">
      <button type="button" onclick="zoomBy(1.35)">放大</button>
      <button type="button" onclick="zoomBy(0.83)">縮小</button>
      <button type="button" class="muted-btn" onclick="resetView()">重置</button>
    </div>
  </div>

  <div class="card">
    <label>你的名字（會顯示誰標記）</label>
    <input id="playerName" placeholder="例如 BYWAY" />

    <label>圖案篩選</label>
    <select id="iconFilterSelect" onchange="renderIconGrid(this.value)">
      <option value="all">全部圖案</option>
      <option value="work">工作 / 產業</option>
      <option value="fish">漁業 / 釣魚</option>
      <option value="shop">商店 / 服務</option>
      <option value="public">公共設施</option>
      <option value="custom">常用 / 自訂</option>
    </select>
    <div class="small warn">上方只是篩選分類；下面點圖案才會切換目前標記圖示。</div>
    <div id="iconGrid" class="icon-grid"></div>

    <label>自訂圖示（可留空）</label>
    <input id="customIcon" placeholder="例如 💰" />
  </div>

  <div class="card">
    <label>GitHub Token（只有上傳同步才需要）</label>
    <input id="ghToken" type="password" autocomplete="off" placeholder="第一次同步時貼 github_pat_ Token，之後會記住" />
    <div class="small warn">不填 Token 也能看公開標記、也能本機標記；Token 會記住在這台裝置，之後上傳同步不用重貼。</div>
    <div class="row" style="margin-top:8px">
      <button type="button" onclick="saveSettings()">儲存設定</button>
      <button type="button" class="muted-btn" onclick="loadPublicMarkers(true)">重新讀取標記</button>
      <button type="button" onclick="uploadSync()">上傳同步</button>
    </div>
    <div id="syncStatus" class="small warn" style="margin-top:8px">目前：觀看公開標記 / 本機編輯模式</div>
  </div>

  <div class="card">
    <div id="markerCount" class="small">目前地圖共有 0 個標記</div>
    <div id="markerList" class="marker-list" style="margin-top:8px"></div>
  </div>
</aside>

<main id="viewer" class="viewer">
  <div id="topbar" class="topbar">
    <button type="button" onclick="zoomBy(1.35)">＋</button>
    <button type="button" onclick="zoomBy(0.83)">－</button>
    <button type="button" onclick="resetView()">重置</button>
  </div>
  <div id="stage"><img id="mapImage" alt="map" draggable="false"></div>
  <div id="markerLayer"></div>
  <div class="hint">清晰圖示層｜圖示不跟地圖一起變糊｜手機：單指拖曳、雙指可深度放大</div>
</main>
</div>

<div id="markerModal" class="modal">
  <div class="modal-box">
    <h3 id="modalTitle" style="margin-top:0">新增標記</h3>
    <label>名稱</label><input id="markerName" placeholder="請輸入標記名稱">
    <div id="markerOwnerInfo" class="small" style="margin-top:6px"></div>
    <label>備註</label><textarea id="markerNote" placeholder="可填價格、用途、說明"></textarea>
    <div class="row" style="margin-top:10px">
      <button type="button" onclick="saveMarker()">儲存</button>
      <button type="button" class="muted-btn" onclick="closeModal()">取消</button>
    </div>
    <button id="deleteBtn" type="button" class="danger" style="margin-top:10px;display:none" onclick="deleteMarker()">刪除標記</button>
  </div>
</div>

<script>
const ICON_GROUPS = {"all": [["🏠", "房子"], ["💎", "鑽石"], ["🐟", "魚"], ["📄", "紙張"], ["📱", "平板"], ["🏭", "托車廠"], ["🪓", "伐木中心"], ["🎣", "漁業中心"], ["⛏️", "礦業中心"], ["💠", "礦石清洗區"], ["🚜", "農場管理員"], ["🪝", "釣魚佈告欄"], ["🪵", "鋸木廠"], ["🧭", "導航點"], ["🚗", "二手車商"], ["🅿️", "停車場"], ["🛒", "商店"], ["🏥", "醫院"], ["🛡️", "警局"], ["🏛️", "市政廳"], ["🔧", "機械師"], ["🔫", "武器商人"], ["⚡", "電力維修工"], ["🏨", "飯店"], ["📍", "一般標記"]], "work": [["🪓", "伐木中心"], ["🪵", "鋸木廠"], ["🚜", "農場管理員"], ["⚡", "電力維修工"], ["🔧", "機械師"], ["⛏️", "礦業中心"], ["💠", "礦石清洗區"]], "fish": [["🎣", "漁業中心"], ["🪝", "釣魚佈告欄"], ["🐟", "魚"]], "shop": [["🛒", "商店"], ["🚗", "二手車商"], ["🅿️", "停車場"], ["🏨", "飯店"], ["🏥", "醫院"]], "public": [["🛡️", "警局"], ["🏛️", "市政廳"], ["🔐", "監獄"], ["⛪", "教堂"], ["🧭", "導航點"], ["📍", "一般標記"]], "custom": [["🏠", "房子"], ["💎", "鑽石"], ["📄", "紙張"], ["📱", "平板"], ["🏭", "托車廠"], ["💰", "錢袋"], ["⭐", "自訂"]]};
const $=id=>document.getElementById(id);
const viewer=$("viewer"),stage=$("stage"),mapImage=$("mapImage"),markerLayer=$("markerLayer"),modal=$("markerModal"),topbar=$("topbar");
let activeMap=localStorage.getItem("gtav_active_map")||"map-atlas.png";
let selectedIcon=localStorage.getItem("gtav_selected_icon")||"🏠";
let allMarkers={}, editingMarkerId=null, pendingPoint=null, githubSha=null;
let viewState={scale:1,x:0,y:0}, imgSize={w:1,h:1}, baseScale=1;
let dragInfo={active:false,moved:false,x:0,y:0,blocked:false};
let pinchInfo=null, movingMarkerId=null, movingMarkerMoved=false, suppressNextMarkerClick=false;
let imageMaskCanvas=document.createElement("canvas"), imageMaskCtx=imageMaskCanvas.getContext("2d",{willReadFrequently:true}), bgColor=[0,0,0];

function iconMarkup(icon){
  return `<span class="emoji-icon">${icon}</span>`;
}

function setStatus(t,type="warn"){$("syncStatus").textContent=t;$("syncStatus").className="small "+(type==="ok"?"ok":type==="bad"?"bad":"warn")}
function getLocalKey(){return"gtav_local_markers_v2"}
function getMarkerBucket(){return allMarkers[activeMap]||[]}
function setMarkerBucket(list){allMarkers[activeMap]=list;saveLocalData()}
function saveLocalData(){localStorage.setItem(getLocalKey(),JSON.stringify(allMarkers));localStorage.setItem("gtav_active_map",activeMap);localStorage.setItem("gtav_selected_icon",selectedIcon)}
function loadLocalData(){try{allMarkers=JSON.parse(localStorage.getItem(getLocalKey())||"{}")}catch{allMarkers={}}}
function saveSettings(){
  localStorage.setItem("gtav_playerName", $("playerName").value);
  localStorage.setItem("gtav_ghToken", $("ghToken").value);
  setStatus("設定已儲存。Token 已記住在這台裝置；之後按「上傳同步」不用重貼。", "ok");
}
function loadSettings(){
  const n = localStorage.getItem("gtav_playerName");
  const t = localStorage.getItem("gtav_ghToken");
  if (n !== null) $("playerName").value = n;
  if (t !== null) $("ghToken").value = t;

  if (t) {
    setStatus("Token 已從這台裝置載入；按「上傳同步」不用重貼。", "ok");
  }
}
function renderIconGrid(filterName){const name=filterName||localStorage.getItem("gtav_icon_filter")||"all";localStorage.setItem("gtav_icon_filter",name);$("iconFilterSelect").value=name;const list=ICON_GROUPS[name]||ICON_GROUPS.all;$("iconGrid").innerHTML=list.map(([icon,label])=>`<button type="button" class="icon-btn" data-icon="${icon}" onclick="selectIcon('${icon}')" title="${label}">${iconMarkup(icon)}<span>${label}</span></button>`).join("");updateIconActiveState()}
function updateIconActiveState(){document.querySelectorAll(".icon-btn").forEach(b=>b.classList.toggle("active",(b.getAttribute("data-icon")||"")===selectedIcon))}
function selectIcon(icon){selectedIcon=icon;localStorage.setItem("gtav_selected_icon",icon);updateIconActiveState();setStatus("目前選擇圖案，點地圖即可新增。","ok")}
function switchMap(name){activeMap=name;$("mapSelect").value=name;mapImage.src=name+"?v="+Date.now();saveLocalData()}
mapImage.onload=()=>{imgSize={w:mapImage.naturalWidth,h:mapImage.naturalHeight};imageMaskCanvas.width=imgSize.w;imageMaskCanvas.height=imgSize.h;imageMaskCtx.drawImage(mapImage,0,0);function s(x,y){const d=imageMaskCtx.getImageData(Math.max(0,Math.min(imgSize.w-1,x)),Math.max(0,Math.min(imgSize.h-1,y)),1,1).data;return[d[0],d[1],d[2]]}const p=[s(5,5),s(imgSize.w-6,5),s(5,imgSize.h-6),s(imgSize.w-6,imgSize.h-6)];bgColor=[0,1,2].map(i=>Math.round(p.reduce((a,b)=>a+b[i],0)/4));resetView();renderMarkers()};
function resetView(){const r=viewer.getBoundingClientRect(),sc=Math.max(r.width/imgSize.w,r.height/imgSize.h);viewState.scale=sc;baseScale=sc;viewState.x=(r.width-imgSize.w*sc)/2;viewState.y=(r.height-imgSize.h*sc)/2;applyView()}
function clampView(){const r=viewer.getBoundingClientRect(),sw=imgSize.w*viewState.scale,sh=imgSize.h*viewState.scale;if(sw<=r.width)viewState.x=(r.width-sw)/2;else viewState.x=Math.min(60,Math.max(r.width-sw-60,viewState.x));if(sh<=r.height)viewState.y=(r.height-sh)/2;else viewState.y=Math.min(60,Math.max(r.height-sh-60,viewState.y))}
function applyView(){clampView();stage.style.transform=`translate(${viewState.x}px,${viewState.y}px) scale(${viewState.scale})`;positionMarkers()}
function zoomAt(f,cx,cy){const bx=(cx-viewState.x)/viewState.scale,by=(cy-viewState.y)/viewState.scale;viewState.scale=Math.max(baseScale*.65,Math.min(baseScale*24,viewState.scale*f));viewState.x=cx-bx*viewState.scale;viewState.y=cy-by*viewState.scale;applyView()}
function zoomBy(f){const r=viewer.getBoundingClientRect();zoomAt(f,r.width/2,r.height/2)}
function screenToImage(cx,cy){const r=viewer.getBoundingClientRect(),x=(cx-r.left-viewState.x)/viewState.scale,y=(cy-r.top-viewState.y)/viewState.scale;return{xPct:Math.max(0,Math.min(100,x/imgSize.w*100)),yPct:Math.max(0,Math.min(100,y/imgSize.h*100))}}
function isPointAllowed(cx,cy){const r=viewer.getBoundingClientRect(),x=(cx-r.left-viewState.x)/viewState.scale,y=(cy-r.top-viewState.y)/viewState.scale;if(x<0||x>imgSize.w||y<0||y>imgSize.h)return false;const d=imageMaskCtx.getImageData(Math.round(x),Math.round(y),1,1).data;const dist=Math.sqrt((d[0]-bgColor[0])**2+(d[1]-bgColor[1])**2+(d[2]-bgColor[2])**2);return dist>38}
function isControlTarget(t){return!!t.closest("button,input,select,textarea,.topbar,.sidebar,.modal")}
viewer.addEventListener("wheel",e=>{if(isControlTarget(e.target))return;e.preventDefault();const r=viewer.getBoundingClientRect();zoomAt(e.deltaY<0?1.18:.86,e.clientX-r.left,e.clientY-r.top)},{passive:false});
viewer.addEventListener("pointerdown",e=>{if(isControlTarget(e.target)||e.target.closest(".marker")||movingMarkerId){dragInfo.blocked=true;return}viewer.setPointerCapture(e.pointerId);dragInfo={active:true,moved:false,x:e.clientX,y:e.clientY,blocked:false}});
viewer.addEventListener("pointermove",e=>{if(!dragInfo.active||dragInfo.blocked||pinchInfo)return;const dx=e.clientX-dragInfo.x,dy=e.clientY-dragInfo.y;if(Math.abs(dx)+Math.abs(dy)>4)dragInfo.moved=true;viewState.x+=dx;viewState.y+=dy;dragInfo.x=e.clientX;dragInfo.y=e.clientY;applyView()});
viewer.addEventListener("pointerup",e=>{if(dragInfo.blocked||isControlTarget(e.target)||e.target.closest(".marker")){dragInfo.active=false;dragInfo.blocked=false;return}if(!dragInfo.active)return;dragInfo.active=false;if(!dragInfo.moved&&!pinchInfo){if(!$("playerName").value.trim()){alert("請先填你的名字");$("playerName").focus();return}if(!isPointAllowed(e.clientX,e.clientY))return;pendingPoint=screenToImage(e.clientX,e.clientY);openCreateModal()}});
viewer.addEventListener("touchstart",e=>{if(isControlTarget(e.target))return;if(e.touches.length===2){e.preventDefault();dragInfo.active=false;dragInfo.blocked=true;const[a,b]=e.touches,r=viewer.getBoundingClientRect(),cx=((a.clientX+b.clientX)/2)-r.left,cy=((a.clientY+b.clientY)/2)-r.top;pinchInfo={dist:Math.max(1,Math.hypot(a.clientX-b.clientX,a.clientY-b.clientY)),scale:viewState.scale,imageX:(cx-viewState.x)/viewState.scale,imageY:(cy-viewState.y)/viewState.scale}}},{passive:false});
viewer.addEventListener("touchmove",e=>{if(e.touches.length===2&&pinchInfo){e.preventDefault();const[a,b]=e.touches,r=viewer.getBoundingClientRect(),dist=Math.max(1,Math.hypot(a.clientX-b.clientX,a.clientY-b.clientY)),cx=((a.clientX+b.clientX)/2)-r.left,cy=((a.clientY+b.clientY)/2)-r.top;viewState.scale=Math.max(baseScale*.65,Math.min(baseScale*24,pinchInfo.scale*(dist/pinchInfo.dist)));viewState.x=cx-pinchInfo.imageX*viewState.scale;viewState.y=cy-pinchInfo.imageY*viewState.scale;applyView()}},{passive:false});
viewer.addEventListener("touchend",()=>{pinchInfo=null;dragInfo.blocked=false});
function escapeHtml(s){return String(s).replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m]))}
function positionMarkers(){document.querySelectorAll(".marker").forEach(btn=>{const x=Number(btn.dataset.xpct)*imgSize.w*viewState.scale/100+viewState.x;const y=Number(btn.dataset.ypct)*imgSize.h*viewState.scale/100+viewState.y;btn.style.left=x+"px";btn.style.top=y+"px"})}
function renderMarkers(){markerLayer.innerHTML="";const markers=getMarkerBucket();markers.forEach(marker=>{const btn=document.createElement("button");btn.className="marker";btn.dataset.id=marker.id;btn.dataset.xpct=marker.xPct;btn.dataset.ypct=marker.yPct;btn.innerHTML=`${iconMarkup(marker.icon)}<span class="marker-label"><span class="marker-name">${escapeHtml(marker.name)}</span><span class="marker-owner">標記者：${escapeHtml(marker.owner||"未命名")}</span>${marker.note ? `<span class="marker-note">${escapeHtml(marker.note)}</span>` : ""}</span>`;btn.title=`${marker.name}｜${marker.owner||"未命名"}`;btn.addEventListener("pointerdown",e=>{e.stopPropagation();e.preventDefault();movingMarkerId=marker.id;movingMarkerMoved=false;suppressNextMarkerClick=false;btn.setPointerCapture(e.pointerId)});btn.addEventListener("click",e=>{e.stopPropagation();if(suppressNextMarkerClick){suppressNextMarkerClick=false;return}openEditModal(marker.id)});markerLayer.appendChild(btn)});positionMarkers();$("markerCount").textContent=`目前地圖共有 ${markers.length} 個標記`;$("markerList").innerHTML=markers.map(m=>`<button type="button" class="marker-item" onclick="openEditModal('${m.id}')"><div><strong>${iconMarkup(m.icon)} ${escapeHtml(m.name)}</strong></div><div class="small">標記者：${escapeHtml(m.owner||"未命名")}${m.note?"｜"+escapeHtml(m.note):""}</div></button>`).join("")}
window.addEventListener("pointermove",e=>{if(!movingMarkerId)return;e.preventDefault();movingMarkerMoved=true;const point=screenToImage(e.clientX,e.clientY),markers=getMarkerBucket(),m=markers.find(x=>x.id===movingMarkerId);if(!m)return;m.xPct=point.xPct;m.yPct=point.yPct;setMarkerBucket(markers);renderMarkers()},{passive:false});
window.addEventListener("pointerup",()=>{if(!movingMarkerId)return;if(movingMarkerMoved){suppressNextMarkerClick=true;setStatus("已移動標記並存在本機；要公開請按「上傳同步」。","warn")}movingMarkerId=null;movingMarkerMoved=false;setTimeout(()=>suppressNextMarkerClick=false,80)});
function openCreateModal(){editingMarkerId=null;$("modalTitle").textContent="新增標記";$("markerName").value="";$("markerNote").value="";$("markerOwnerInfo").textContent="標記者："+$("playerName").value.trim();$("deleteBtn").style.display="none";modal.style.display="flex"}
function openEditModal(id){const m=getMarkerBucket().find(x=>x.id===id);if(!m)return;editingMarkerId=id;$("modalTitle").textContent="編輯標記";$("markerName").value=m.name;$("markerNote").value=m.note||"";$("markerOwnerInfo").textContent="標記者："+(m.owner||"未命名");$("deleteBtn").style.display="block";modal.style.display="flex"}
function closeModal(){modal.style.display="none";editingMarkerId=null;pendingPoint=null}
function saveMarker(){const name=$("markerName").value.trim();if(!name){alert("請輸入名稱");return}const markers=getMarkerBucket();if(editingMarkerId){const m=markers.find(x=>x.id===editingMarkerId);if(!m)return;m.name=name;m.note=$("markerNote").value.trim();m.updatedAt=Date.now()}else{const icon=$("customIcon").value.trim()||selectedIcon;markers.push({id:crypto.randomUUID(),xPct:pendingPoint.xPct,yPct:pendingPoint.yPct,icon,name,note:$("markerNote").value.trim(),owner:$("playerName").value.trim(),createdAt:Date.now()})}setMarkerBucket(markers);renderMarkers();closeModal();setStatus("已儲存在本機；要公開請按「上傳同步」。","warn")}
function deleteMarker(){if(!editingMarkerId)return;setMarkerBucket(getMarkerBucket().filter(x=>x.id!==editingMarkerId));renderMarkers();closeModal();setStatus("已在本機刪除；要公開請按「上傳同步」。","warn")}
function b64encodeUtf8(str){return btoa(unescape(encodeURIComponent(str)))}
async function loadPublicMarkers(confirmOverwrite=false){try{if(confirmOverwrite&&Object.values(allMarkers).some(a=>Array.isArray(a)&&a.length>0)&&!confirm("重新讀取會覆蓋你目前本機標記，確定？"))return;setStatus("讀取公開標記中...","warn");const res=await fetch(`markers.json?v=${Date.now()}`,{cache:"no-store"});if(!res.ok)throw new Error(await res.text());const text=await res.text();const parsed=text.trim()?JSON.parse(text):{};allMarkers=Array.isArray(parsed)?{[activeMap]:parsed}:(parsed||{});saveLocalData();renderMarkers();setStatus("已讀取公開標記；你可以本機編輯，公開請按「上傳同步」。","ok")}catch(e){console.error(e);setStatus("讀取公開標記失敗；保留目前本機標記。","bad")}}
async function uploadSync(){const token=$("ghToken").value.trim();if(!token){alert("要上傳同步，請先填 GitHub Token");$("ghToken").focus();return}try{setStatus("上傳同步中...","warn");const getRes=await fetch("https://api.github.com/repos/BYwayJu/gtav-map/contents/markers.json?ref=main",{headers:{Authorization:`Bearer ${token}`,Accept:"application/vnd.github+json"}});if(!getRes.ok)throw new Error(await getRes.text());const data=await getRes.json();const putRes=await fetch("https://api.github.com/repos/BYwayJu/gtav-map/contents/markers.json",{method:"PUT",headers:{Authorization:`Bearer ${token}`,Accept:"application/vnd.github+json"},body:JSON.stringify({message:"sync markers",content:b64encodeUtf8(JSON.stringify(allMarkers,null,2)),branch:"main",sha:data.sha})});if(!putRes.ok)throw new Error(await putRes.text());setStatus("已上傳同步；其他人重新整理或重新讀取後可看到。","ok");alert("已上傳同步")}catch(e){console.error(e);setStatus("上傳失敗：請確認 Token 有 Contents Read and write 權限","bad");alert("上傳失敗：請確認 Token 有 Contents Read and write 權限")}}
window.addEventListener("resize",resetView);
loadLocalData();
loadSettings();

$("playerName").addEventListener("input", () => {
  localStorage.setItem("gtav_playerName", $("playerName").value);
});
$("ghToken").addEventListener("input", () => {
  localStorage.setItem("gtav_ghToken", $("ghToken").value);
  if ($("ghToken").value.trim()) {
    setStatus("Token 已自動記住在這台裝置。", "ok");
  }
});

renderIconGrid(localStorage.getItem("gtav_icon_filter") || "all");
selectIcon(selectedIcon);
switchMap(activeMap);
setTimeout(() => loadPublicMarkers(false), 500);
</script>
</body>
</html>
